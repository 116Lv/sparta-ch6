spring:
  application:
    name: demo
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sparta_ch6?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      encoding: UTF-8
      mode: always

logging:
  level:
    org.hibernate.SQL: debug
